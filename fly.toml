# fly.toml app configuration file generated for finrag-api on 2026-06-26T16:32:09-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'finrag-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CLAUDE_MODEL = 'claude-haiku-4-5-20251001'
  DAILY_QUESTION_CAP = '300'
  LLM_PROVIDER = 'anthropic'
  RATE_LIMIT_PER_MIN = '8'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '25s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
