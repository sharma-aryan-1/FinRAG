services:
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: finrag-qdrant
    ports:
    - "6333:6333"   # REST API
    - "6334:6334"   # gRPC API]
    volumes:
    - qdrant_storage:/qdrant/storage
    environment:
    - QDRANT__SERVICE__GRPC_PORT=6334
    - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  qdrant_storage: